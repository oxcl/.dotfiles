formula = "vibmax"
description = "Vision → Integrate → Blueprint → Multiplex → Action → Examine workflow"
version = 1

[vars.vibmax_name]
description = "Name of the vibmax"
required = true

[vars.vibmax_description]
description = "Description of the vibmax"
required = true

[[steps]]
id = "vision"
title = "Vision: {{vibmax_name}}"
type = "task"
labels = ["phase:vision"]

[[steps]]
id = "integrate"
title = "Integrate"
type = "task"
needs = ["vision"]
labels = ["phase:integrate"]

[[steps]]
id = "blueprint"
title = "Blueprint"
type = "task"
needs = ["integrate"]
labels = ["phase:blueprint"]

[[steps]]
id = "multiplex"
title = "Multiplex"
type = "task"
needs = ["blueprint"]
labels = ["phase:multiplex"]

[[steps]]
id = "action"
title = "Action"
type = "task"
needs = ["multiplex"]
labels = ["phase:action", "structural"]

[[steps]]
id = "examine"
title = "Examine"
type = "task"
needs = ["action"]
labels = ["phase:examine"]
