formula = "vibmax-action"
description = "Individual action molecule with do/test cycle"
version = 1

[vars.task_name]
description = "Name of the action task"
required = true

[[steps]]
id = "do"
title = "Do: {{task_name}}"
type = "task"
labels = ["type:action", "orchestrator:assignable"]

[[steps]]
id = "test"
title = "Test: {{task_name}}"
type = "task"
needs = ["do"]
labels = ["type:action", "orchestrator:assignable", "phase:test"]
